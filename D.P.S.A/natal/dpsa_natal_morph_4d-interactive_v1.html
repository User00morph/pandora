<title>MORPH — 4D NATAL LANDSCAPE · ALL LAYERS</title>
<style>
:root {
  --bg:#03050e;--panel:rgba(6,9,22,0.94);--border:rgba(110,80,210,0.28);
  --gold:#c9a84c;--gold2:#f0d080;--cyan:#4fc3f7;--violet:#9c6fda;--mint:#66ffb2;
  --fire:#ff6e3a;--water:#5060c8;--earth:#5faa60;--air:#f0c840;
  --trine:rgba(70,140,255,0.75);--sextile:rgba(60,210,160,0.65);

  --text:#ddd8f0;--dim:rgba(170,150,230,0.5);

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Georgia',serif;}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

.layout{
  position:relative;z-index:1;display:grid;
  grid-template-columns:240px 1fr 290px;
  grid-template-rows:52px 1fr;
  height:100vh;
}

/* HEADER */
.header{
  grid-column:1/-1;padding:0 20px;border-bottom:1px solid var(--border);
  background:var(--panel);display:flex;align-items:center;justify-content:space-between;
}
.header-title{font-size:1em;letter-spacing:.18em;color:var(--gold);}
.header-sub{font-size:.62em;color:var(--dim);letter-spacing:.1em;margin-top:2px;}
.dim-pills{display:flex;gap:5px;}
.dim-pill{
  padding:4px 11px;font-size:.65em;letter-spacing:.1em;border:1px solid var(--border);
  border-radius:12px;background:transparent;color:var(--dim);cursor:pointer;transition:all .3s;
}
.dim-pill.on{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.12);}
.dim-pill.on.sid{color:var(--cyan);border-color:var(--cyan);background:rgba(79,195,247,.1);}
.dim-pill.on.drac{color:var(--mint);border-color:var(--mint);background:rgba(102,255,178,.08);}
.dim-pill.on.es{color:#d080ff;border-color:#d080ff;background:rgba(208,128,255,.08);}

/* LAYER PANEL */
.layer-panel{
  background:var(--panel);border-right:1px solid var(--border);
  overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--violet) transparent;
}
.lg-title{
  font-size:.58em;letter-spacing:.18em;color:var(--violet);padding:8px 12px 3px;
  text-transform:uppercase;border-bottom:1px solid rgba(110,80,210,.12);margin-bottom:2px;
}
.li{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  cursor:pointer;transition:background .2s;border-left:2px solid transparent;
}
.li:hover{background:rgba(110,80,210,.1);}
.li.focused{background:rgba(201,168,76,.12);border-left-color:var(--gold);}
.li-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 4px currentColor;
}
.li-n{font-size:.55em;color:var(--dim);width:16px;flex-shrink:0;}
.li-name{font-size:.65em;color:var(--text);flex:1;line-height:1.3;}
.li.focused .li-name{color:var(--gold2);}
.li-badge{font-size:.48em;padding:1px 4px;border-radius:2px;flex-shrink:0;}
.t1{background:rgba(80,200,120,.15);color:#70e090;border:1px solid rgba(80,200,120,.25);}
.t2{background:rgba(200,170,.80,.12);color:#c0a050;border:1px solid rgba(200,170,80,.2);}
.t3{background:rgba(180,80,220,.12);color:#d060f0;border:1px solid rgba(180,80,220,.2);}

/* CHART */
.chart-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  background:radial-gradient(ellipse at center,rgba(18,8,45,.7) 0%,transparent 72%);
}
.scene{perspective:1400px;width:580px;height:580px;}
.wheel3d{
  width:100%;height:100%;transform-style:preserve-3d;
  transform:rotateX(10deg) rotateZ(-1.5deg);transition:transform .9s ease;
}
.wheel3d:hover{transform:rotateX(5deg) rotateZ(0deg);}
#W{width:100%;height:100%;filter:drop-shadow(0 0 24px rgba(90,60,180,.45));}

.bottom-bar{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(3,5,14,.92);border:1px solid var(--gold);border-radius:3px;
  padding:6px 16px;font-size:.62em;letter-spacing:.09em;color:var(--gold);
  max-width:440px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* INFO PANEL */
.info-panel{
  background:var(--panel);border-left:1px solid var(--border);
  overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--violet) transparent;
}
.ih{font-size:.6em;letter-spacing:.14em;color:var(--violet);text-transform:uppercase;
    margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.pf{text-align:center;padding:12px 0;}
.psym{font-size:3.2em;display:block;margin-bottom:3px;}
.pname{font-size:.95em;color:var(--gold);letter-spacing:.14em;}
.ppos{font-size:.68em;color:var(--dim);margin-top:3px;}
.isec{margin-top:11px;padding-top:8px;border-top:1px solid rgba(110,80,210,.14);}
.ist{font-size:.56em;letter-spacing:.14em;color:var(--violet);text-transform:uppercase;margin-bottom:5px;}
.ir{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px;}
.il{font-size:.6em;color:var(--dim);flex-shrink:0;}
.iv{font-size:.62em;color:var(--text);text-align:right;}
.iv.g{color:var(--gold2);}
.iv.c{color:var(--cyan);}
.iv.m{color:var(--mint);}
.iv.v{color:#d090ff;}
.itext{font-size:.61em;color:var(--text);line-height:1.6;margin-top:3px;font-style:italic;opacity:.85;}
.dim-badge{
  display:inline-block;padding:1px 6px;border-radius:10px;font-size:.55em;
  margin-right:4px;letter-spacing:.06em;
}
.db-t{background:rgba(255,110,58,.15);color:var(--fire);border:1px solid rgba(255,110,58,.25);}
.db-s{background:rgba(79,195,247,.12);color:var(--cyan);border:1px solid rgba(79,195,247,.25);}
.db-d{background:rgba(102,255,178,.1);color:var(--mint);border:1px solid rgba(102,255,178,.2);}
.db-e{background:rgba(208,128,255,.1);color:#d080ff;border:1px solid rgba(208,128,255,.2);}

/* Tooltip */
#tip{
  position:fixed;background:rgba(6,9,22,.97);border:1px solid var(--gold);border-radius:3px;
  padding:7px 11px;font-size:.62em;pointer-events:none;z-index:999;
  max-width:200px;line-height:1.6;display:none;
}
#tip.on{display:block;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(110,80,210,.4);border-radius:2px;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadein .35s ease forwards;}
</style>
</head>

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let focusedLayer=null;
let selectedPlanet=null;
let dimVis={tropical:true,sidereal:true,draconic:true,esoteric:true};

// ─────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────
function svgA(lon){
  const fa=((lon-ASC)%360+360)%360;
  return (180-fa+360)%360;
}
function polar(a,r){
  const rad=a*Math.PI/180;
  return{x:CX+r*Math.cos(rad),y:CY+r*Math.sin(rad)};
}
function ppos(lon,r){return polar(svgA(lon),r);}
function ecol(e){return{fire:'var(--fire)',water:'var(--water)',earth:'var(--earth)',air:'var(--air)'}[e]||'#aaa';}
function el(t,a={}){
  const e=document.createElementNS('http://www.w3.org/2000/svg',t);
  Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function addStop(g,off,c){
  const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s.setAttribute('offset',off);s.setAttribute('stop-color',c);g.appendChild(s);
}

// ─────────────────────────────────────────
// PLANET RADIUS (collision offset)
// ─────────────────────────────────────────
const P_R={moon:R_T+18,jupiter:R_T-18,nn:R_T+26,sn:R_T-14,chiron:R_T-24,pof:R_T+14};
const P_R_S={moon:R_S+14,jupiter:R_S-14,nn:R_S+20,sn:R_S-10,chiron:R_S-16,pof:R_S+10};
const P_R_D={moon:R_D+16,jupiter:R_D-16,nn:R_D+22,sn:R_D-12,chiron:R_D-18,pof:R_D+12};
function pr(k,base,map){return map[k]||base;}

// ─────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────
function draw(){
  const svg=document.getElementById('W');
  svg.innerHTML='';

  // DEFS
  const df=el('defs');
  ['glow-trine','glow-planet','glow-gold','glow-sidereal','glow-drac'].forEach((id,i)=>{
    const f=el('filter',{id,x:'-60%',y:'-60%',width:'220%',height:'220%'});
    f.appendChild(el('feGaussianBlur',{in:'SourceGraphic',stdDeviation:[3,4,5,3,3][i]}));
    df.appendChild(f);
  });
  const rg=el('radialGradient',{id:'cg',cx:'50%',cy:'50%',r:'50%'});
  addStop(rg,'0%','rgba(60,30,120,.5)');addStop(rg,'100%','rgba(3,5,14,0)');
  df.appendChild(rg);
  svg.appendChild(df);

  // BG
  svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_OUT+6,fill:'rgba(3,5,14,.65)',stroke:'rgba(110,80,210,.2)','stroke-width':1}));

  // POLARITY AXES (background)
  if(dimVis.tropical){
    AXES.forEach((ax,i)=>{
      const p1=ppos(ax.lon1,R_OUT+4),p2=ppos(ax.lon2,R_OUT+4);
      const active=focusedLayer===12;
      svg.appendChild(el('line',{
        x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
        stroke:active?'rgba(240,200,64,.35)':'rgba(110,80,210,.07)',
        'stroke-width':active?0.8:0.5,'stroke-dasharray':'2,8'
      }));
    });
    // Highlight Taurus/Scorpio (dominant axis)
    const tax=AXES[1];
    const tp1=ppos(tax.lon1,R_OUT+4),tp2=ppos(tax.lon2,R_OUT+4);
    svg.appendChild(el('line',{
      x1:tp1.x,y1:tp1.y,x2:tp2.x,y2:tp2.y,
      stroke:'rgba(150,100,240,.18)','stroke-width':1.5,'stroke-dasharray':'4,6',
      filter:'url(#glow-trine)'
    }));
  }

  // SIGN BANDS
  for(let i=0;i<12;i++){
    const sl=i*30,ea=svgA(sl),eb=svgA((sl+30)%360);
    const s1=polar(ea,R_SIGN),e1=polar(eb,R_SIGN);
    const s2=polar(ea,R_OUT),e2=polar(eb,R_OUT);
    svg.appendChild(el('path',{
      d:`M ${s2.x} ${s2.y} A ${R_OUT} ${R_OUT} 0 0 1 ${e2.x} ${e2.y} L ${e1.x} ${e1.y} A ${R_SIGN} ${R_SIGN} 0 0 0 ${s1.x} ${s1.y} Z`,
      fill:ECOLS[ELEMS[i]],stroke:'rgba(110,80,210,.18)','stroke-width':.5
    }));
    const ma=svgA(sl+15),mp=polar(ma,(R_SIGN+R_OUT)/2+2);
    const sigT=el('text',{x:mp.x,y:mp.y,'text-anchor':'middle','dominant-baseline':'central',
      fill:ETXT[ELEMS[i]],'font-size':'13','font-family':'Georgia',opacity:'.88'});
    sigT.textContent=SIGNS[i]; svg.appendChild(sigT);
    const ts=polar(svgA(sl),R_SIGN),te=polar(svgA(sl),R_OUT-2);
    svg.appendChild(el('line',{x1:ts.x,y1:ts.y,x2:te.x,y2:te.y,stroke:'rgba(110,80,210,.4)','stroke-width':.8}));
  }
  svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_OUT,fill:'none',stroke:'rgba(110,80,210,.45)','stroke-width':1.5}));
  svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_SIGN,fill:'none',stroke:'rgba(110,80,210,.25)','stroke-width':.8}));

  // HOUSE CUSPS
  for(let h=0;h<12;h++){
    const cl=(ASC+h*30)%360,a=svgA(cl);
    const p1=polar(a,R_SIGN),p2=polar(a,R_INNER);
    const isAng=h===0||h===3||h===6||h===9;
    svg.appendChild(el('line',{
      x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
      stroke:isAng?'rgba(201,168,76,.65)':'rgba(110,80,210,.18)',
      'stroke-width':isAng?1.5:.7,'stroke-dasharray':isAng?'':'3,5'
    }));
    const hma=svgA((ASC+(h+.5)*30)%360),hmp=polar(hma,(R_HSE+R_SIGN)/2);
    const ht=el('text',{x:hmp.x,y:hmp.y,'text-anchor':'middle','dominant-baseline':'central',
      fill:'rgba(170,150,230,.55)','font-size':'8','font-family':'Georgia'});
    ht.textContent=h+1; svg.appendChild(ht);
  }
  svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_INNER,fill:'url(#cg)',stroke:'rgba(201,168,76,.28)','stroke-width':.8}));
  svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_HSE,fill:'none',stroke:'rgba(110,80,210,.15)','stroke-width':.5}));

  // ANGLE LABELS
  [{lon:ASC,l:'ASC'},{lon:(ASC+180)%360,l:'DSC'},{lon:MC,l:'MC'},{lon:(MC+180)%360,l:'IC'}].forEach(({lon,l})=>{
    const p=ppos(lon,R_INNER-15);
    const t=el('text',{x:p.x,y:p.y,'text-anchor':'middle','dominant-baseline':'central',
      fill:'rgba(201,168,76,.85)','font-size':'7.5','font-weight':'bold'});
    t.textContent=l; svg.appendChild(t);
  });

  // CENTER
  const ct=el('text',{x:CX,y:CY,'text-anchor':'middle','dominant-baseline':'central',fill:'rgba(201,168,76,.35)','font-size':'20'});
  ct.textContent='◈'; svg.appendChild(ct);

  // FIXED STARS (Layer 17)
  if(dimVis.tropical){
    const foc17=focusedLayer===17;
    FSTARS.forEach(fs=>{
      const p=ppos(fs.lon,R_OUT-10);
      svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:3,fill:'rgba(255,255,160,.5)',stroke:'rgba(255,255,100,.7)','stroke-width':.5,filter:'url(#glow-gold)'}));
      if(foc17||true){
        const t=el('text',{x:p.x,y:p.y-9,'text-anchor':'middle',fill:'rgba(255,255,120,.55)','font-size':'5.5'});
        t.textContent='★'+fs.label; svg.appendChild(t);
      }
    });
  }

  // ANTISCIA LINES (Layer 24)
  if(dimVis.tropical){
    const foc24=focusedLayer===24;
    ANTISCIA.forEach(ant=>{
      const planet=TP[ant.a];
      if(!planet)return;
      const p1=ppos(planet.lon,R_T+8),p2=ppos(ant.alon,R_T+8);
      svg.appendChild(el('line',{
        x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
        stroke:foc24?'rgba(220,180,40,.7)':'rgba(220,180,40,.25)',
        'stroke-width':foc24?1.2:.6,'stroke-dasharray':'3,5',
        filter:foc24?'url(#glow-gold)':''
      }));
    });
  }

  // ASPECTS (Layer 2)
  drawAspects(svg);

  // DRACONIC RING (Layer 9)
  if(dimVis.draconic){
    const foc=focusedLayer===9;
    const opacity=foc?0.85:0.45;
    svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_D,fill:'none',stroke:`rgba(102,255,178,${foc?0.2:0.08})`,'stroke-width':foc?1:.5,'stroke-dasharray':'1,4'}));
    Object.entries(TP).forEach(([k,p])=>{
      if(!DP[k]&&DP[k]!==0)return;
      const r=pr(k,R_D,P_R_D);
      const pos=ppos(DP[k],r);
      svg.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:foc?4:2.5,fill:'rgba(102,255,178,.6)',opacity,filter:foc?'url(#glow-drac)':''}));
      if(foc){
        const t=el('text',{x:pos.x,y:pos.y-8,'text-anchor':'middle',fill:'rgba(102,255,178,.8)','font-size':'8'});
        t.textContent=p.s; svg.appendChild(t);
      }
    });
  }

  // SIDEREAL RING (Layer 10)
  if(dimVis.sidereal){
    const foc=focusedLayer===10;
    const opacity=foc?0.9:0.5;
    svg.appendChild(el('circle',{cx:CX,cy:CY,r:R_S,fill:'none',stroke:`rgba(79,195,247,${foc?0.2:0.08})`,'stroke-width':foc?1:.5,'stroke-dasharray':'2,6'}));
    Object.entries(TP).forEach(([k,p])=>{
      const sd=SP[k];if(!sd)return;
      const r=pr(k,R_S,P_R_S);
      const pos=ppos(sd.lon,r);
      svg.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:foc?4.5:2.8,fill:'rgba(79,195,247,.65)',opacity,filter:foc?'url(#glow-sidereal)':''}));
      if(foc||focusedLayer===10){
        const t=el('text',{x:pos.x,y:pos.y-9,'text-anchor':'middle',fill:'rgba(79,195,247,.85)','font-size':'8.5'});
        t.textContent=p.s; svg.appendChild(t);
      } else if(!foc){
        // tiny indicator
        const t=el('text',{x:pos.x,y:pos.y-6,'text-anchor':'middle',fill:'rgba(79,195,247,.35)','font-size':'6'});
        t.textContent=p.s; svg.appendChild(t);
      }
    });
    // Connecting lines trop→sid for planets that shift significantly
    if(dimVis.tropical){
      Object.entries(TP).forEach(([k,p])=>{
        const sd=SP[k];if(!sd)return;
        const diff=Math.abs(((p.lon-sd.lon)+360)%360);
        const d2=Math.min(diff,360-diff);
        if(d2>3){ // only show lines for significant shifts
          const pt=ppos(p.lon,pr(k,R_T,P_R));
          const ps=ppos(sd.lon,pr(k,R_S,P_R_S));
          svg.appendChild(el('line',{
            x1:pt.x,y1:pt.y,x2:ps.x,y2:ps.y,
            stroke:'rgba(79,195,247,.2)','stroke-width':.5,'stroke-dasharray':'2,4'
          }));
        }
      });
    }
  }

  // TROPICAL PLANETS (Layer 1 — main ring, drawn last so on top)
  drawTropicalPlanets(svg);

  // ESOTERIC OVERLAYS (Layer 13, 21, 22)
  if(dimVis.esoteric) drawEsotericOverlays(svg);
}

function drawAspects(svg){
  const hl=focusedLayer?LAYERS.find(l=>l.n===focusedLayer)?.highlights||[]:[];
  ASPS.forEach(asp=>{
    const pa=TP[asp.a],pb=TP[asp.b];if(!pa||!pb)return;
    const r=R_T-6;
    const p1=ppos(pa.lon,pr(asp.a,r,P_R));
    const p2=ppos(pb.lon,pr(asp.b,r,P_R));
    const isWT=asp.d.includes('Grand Water');
    const isKite=asp.d.includes('Kite');
    const focused=focusedLayer===2||(!focusedLayer);
    const hlit=hl.length===0||(hl.includes(asp.a)&&hl.includes(asp.b));
    svg.appendChild(el('line',{
      x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
      stroke:asp.c,
      'stroke-width':focusedLayer&&!hlit?asp.w*.3:asp.w,
      opacity:focusedLayer&&!hlit?0.08:isWT?0.8:isKite?0.7:0.45,
      filter:isWT?'url(#glow-trine)':isKite?'url(#glow-gold)':'',
      'stroke-dasharray':asp.t==='sext'?'4,3':asp.t==='square'?'2,3':asp.t==='trine'?'':asp.t==='opp'?'6,2':''
    }));
  });
}

function drawTropicalPlanets(svg){
  const hl=focusedLayer?LAYERS.find(l=>l.n===focusedLayer)?.highlights||[]:[];
  if(!dimVis.tropical)return;
  Object.entries(TP).forEach(([k,p])=>{
    const r=pr(k,R_T,P_R);
    const pos=ppos(p.lon,r);
    const isSel=selectedPlanet===k;
    const isHL=hl.length===0||hl.includes(k);
    const opacity=isHL?1:0.2;
    const col=ecol(p.e);

    // Glow ring
    if(isSel){
      svg.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:16,fill:'none',stroke:'var(--gold)','stroke-width':1.8,filter:'url(#glow-gold)',opacity:.9}));
    } else if(isHL&&focusedLayer){
      svg.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:13,fill:'none',stroke:col,'stroke-width':.8,opacity:.45}));
    }

    // Chart ruler indicators (Layer 11)
    if((k==='moon'||k==='mercury')&&(dimVis.esoteric||focusedLayer===11)){
      const cr=k==='moon'?'♋':'♊';
      const ct=el('text',{x:pos.x+11,y:pos.y-11,'text-anchor':'middle',fill:'rgba(201,168,76,.75)','font-size':'7'});
      ct.textContent=cr+'✦'; svg.appendChild(ct);
    }

    // Fall/Detriment badge (Layer 4)
    if((k==='moon'||k==='mars')&&dimVis.tropical){
      const ft=el('text',{x:pos.x-10,y:pos.y+12,'text-anchor':'middle',fill:'rgba(255,140,80,.55)','font-size':'5.5'});
      ft.textContent='fall'; svg.appendChild(ft);
    }
    if((k==='venus'||k==='saturn')&&dimVis.tropical){
      const ft=el('text',{x:pos.x-10,y:pos.y+12,'text-anchor':'middle',fill:'rgba(255,160,100,.5)','font-size':'5.5'});
      ft.textContent='det'; svg.appendChild(ft);
    }

    // Planet dot
    svg.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:isSel?5.5:3.8,fill:col,opacity,filter:isHL?'url(#glow-planet)':''}));

    // Symbol
    const sym=el('text',{
      x:pos.x,y:pos.y-12,'text-anchor':'middle','dominant-baseline':'central',
      fill:isSel?'var(--gold2)':col,'font-size':isSel?'15.5':'13.5','font-family':'Georgia',
      opacity,'cursor':'pointer','data-planet':k,
      filter:isHL&&(isSel||focusedLayer)?'url(#glow-planet)':''
    });
    sym.textContent=p.s; svg.appendChild(sym);

    // Retrograde
    if(p.rt){
      const rt=el('text',{x:pos.x+9,y:pos.y-9,'text-anchor':'middle',fill:col,'font-size':'7',opacity:opacity*.8});
      rt.textContent='ℛ'; svg.appendChild(rt);
    }

    // Hit target
    const hit=el('circle',{cx:pos.x,cy:pos.y,r:18,fill:'transparent',cursor:'pointer','data-planet':k});
    svg.appendChild(hit);
  });
}

function drawEsotericOverlays(svg){
  const foc13=focusedLayer===13;
  const foc21=focusedLayer===21;
  const foc22=focusedLayer===22;
  const hl=focusedLayer?LAYERS.find(l=>l.n===focusedLayer)?.highlights||[]:[];

  Object.entries(TP).forEach(([k,p])=>{
    const es=ES[k];if(!es)return;
    const r=pr(k,R_T,P_R);
    const pos=ppos(p.lon,r);
    const isHL=hl.length===0||hl.includes(k);
    if(!isHL)return;

    // God body name (Layer 13 / always dim)
    if(foc13){
      const t=el('text',{x:pos.x,y:pos.y+18,'text-anchor':'middle',fill:'rgba(200,140,255,.9)','font-size':'7','font-weight':'bold'});
      t.textContent=es.god; svg.appendChild(t);
    } else {
      const t=el('text',{x:pos.x,y:pos.y+16,'text-anchor':'middle',fill:'rgba(180,120,240,.4)','font-size':'5.5'});
      t.textContent=es.god.split('/')[0].split(' ')[0]; svg.appendChild(t);
    }

    // Esoteric ruler (Layer 21)
    if(foc21){
      const t=el('text',{x:pos.x,y:pos.y+26,'text-anchor':'middle',fill:'rgba(220,160,255,.85)','font-size':'6.5'});
      t.textContent='→'+es.ruler; svg.appendChild(t);
    }

    // Archon (Layer 22)
    if(foc22){
      const t=el('text',{x:pos.x,y:pos.y+26,'text-anchor':'middle',fill:'rgba(255,100,130,.75)','font-size':'6'});
      t.textContent=es.archon; svg.appendChild(t);
    }

    // Archon indicator dot (always dim)
    if(!foc22&&dimVis.esoteric){
      const da=ppos(p.lon+4,r+4);
      svg.appendChild(el('circle',{cx:da.x,cy:da.y,r:1.5,fill:'rgba(255,100,130,.25)'}));
    }
  });
}

function buildLayers(){
  const lp=document.getElementById('LP');
  const groups=[{t:'Tier 1 — Active (1–10)',tier:1},{t:'Tier 2 — Identified (11–20)',tier:2},{t:'Tier 2B — Esoteric (21–30)',tier:3}];
  groups.forEach(g=>{
    const gt=document.createElement('div');gt.className='lg-title';gt.textContent=g.t;lp.appendChild(gt);
    LAYERS.filter(l=>l.tier===g.tier).forEach(layer=>{
      const item=document.createElement('div');item.className='li';item.dataset.n=layer.n;
      const bc={'LIVE':'t1','ID':'t2','OCC':'t3'}[layer.badge]||'t1';
      item.innerHTML=`<div class="li-dot" style="background:${layer.dot};color:${layer.dot}"></div><span class="li-n">${layer.n}</span><span class="li-name">${layer.name}</span><span class="li-badge ${bc}">${layer.badge}</span>`;
      item.addEventListener('click',()=>focusLayer(layer.n));
      lp.appendChild(item);
    });
  });
}

function focusLayer(n){
  focusedLayer=focusedLayer===n?null:n;
  document.querySelectorAll('.li').forEach(i=>i.classList.toggle('focused',parseInt(i.dataset.n)===focusedLayer));
  const l=LAYERS.find(x=>x.n===focusedLayer);
  document.getElementById('BB').textContent=l?`Layer ${l.n}: ${l.name} — ${l.desc}`:'All 30 layers active simultaneously · Click any layer to focus · Click any planet to explore';
  draw();
}

// ─────────────────────────────────────────
// DIM PILLS
// ─────────────────────────────────────────
document.querySelectorAll('.dim-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    const d=pill.dataset.dim;
    dimVis[d]=!dimVis[d];
    pill.classList.toggle('on',dimVis[d]);
    draw();
  });
});

// ─────────────────────────────────────────
// PLANET INTERACTION
// ─────────────────────────────────────────
document.getElementById('W').addEventListener('click',e=>{
  const k=e.target.getAttribute('data-planet');
  if(!k||!TP[k])return;
  selectedPlanet=selectedPlanet===k?null:k;
  draw();
  if(selectedPlanet)showInfo(selectedPlanet);
  else resetInfo();
});

document.getElementById('W').addEventListener('mousemove',e=>{
  const k=e.target.getAttribute('data-planet');
  const tip=document.getElementById('tip');
  if(k&&TP[k]){
    const p=TP[k],es=ES[k]||{};
    tip.innerHTML=`<b style="color:var(--gold)">${p.s} ${p.n}</b><br>${p.dp} · H${p.h}<br><span style="color:#a080e0">${es.god||''}</span>`;
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';tip.classList.add('on');
  } else tip.classList.remove('on');
});
document.getElementById('W').addEventListener('mouseleave',()=>document.getElementById('tip').classList.remove('on'));

// ─────────────────────────────────────────
// INFO PANEL
// ─────────────────────────────────────────
function showInfo(k){
  const p=TP[k],es=ES[k]||{},sd=SP[k]||{},dc=DP[k];
  document.getElementById('FS').textContent=p.s;
  document.getElementById('FN').textContent=p.n;
  document.getElementById('FP').textContent=`${p.dp} · WS H${p.h}`;
  const fd=document.getElementById('FD');fd.className='fi';
  fd.innerHTML=`
    <div class="isec"><div class="ist">◈ DIM I — Tropical</div>
      <div class="ir"><span class="il">Position</span><span class="iv g">${p.dp}</span></div>
      <div class="ir"><span class="il">WS House</span><span class="iv">${p.h}</span></div>
      <div class="ir"><span class="il">Element</span><span class="iv">${p.e}</span></div>
      <div class="ir"><span class="il">Dignity</span><span class="iv">${es.dig||'—'}</span></div>
      ${p.rt?'<div class="ir"><span class="il">Motion</span><span class="iv" style="color:#ff9966">Retrograde</span></div>':''}
    </div>
    <div class="isec"><div class="ist">◈ DIM II — Sidereal (Lahiri)</div>
      <div class="ir"><span class="il">Sign</span><span class="iv c">${sd.sign||'—'}</span></div>
      <div class="ir"><span class="il">Longitude</span><span class="iv c">${sd.lon!==undefined?sd.lon.toFixed(2)+'°':'—'}</span></div>
      ${k==='moon'?'<div class="ir"><span class="il">Nakshatra</span><span class="iv c">Swati (Rahu/Vayu)</span></div>':''}
      ${k==='venus'?'<div class="ir"><span class="il">Note</span><span class="iv c">EXALTATION in Pisces</span></div>':''}
    </div>
    <div class="isec"><div class="ist">◈ DIM III — Draconic</div>
      <div class="ir"><span class="il">Longitude</span><span class="iv m">${dc!==undefined?dc.toFixed(2)+'°':'—'}</span></div>
      <div class="ir"><span class="il">Soul memory</span><span class="iv m">≈ Tropical (confirmed)</span></div>
      ${k==='venus'?'<div class="ir"><span class="il">Cross-contact</span><span class="iv m">conjunct N.Node 3.4°</span></div>':''}
    </div>
    <div class="isec"><div class="ist">◈ DIM IV — Esoteric</div>
      <div class="ir"><span class="il">God Body</span><span class="iv v">${es.god||'—'}</span></div>
      <div class="ir"><span class="il">Esoteric Ruler</span><span class="iv v">${es.ruler||'—'}</span></div>
      <div class="ir"><span class="il">Archon-veil</span><span class="iv" style="color:#ff8090">${es.archon||'—'}</span></div>
      <div class="ir"><span class="il">Seven Rays</span><span class="iv">${es.ray||'—'}</span></div>
    </div>
    <div class="isec"><div class="ist">◈ Sabian Image</div>
      <div class="itext">${es.sabian||'—'}</div>
    </div>
    <div class="isec"><div class="ist">◈ Active Layers</div>
      ${LAYERS.filter(l=>l.highlights.includes(k)).map(l=>`<span class="dim-badge ${['','db-t','db-t','db-s','db-d','db-e'][Math.min(l.tier,5)]||'db-e'}">L${l.n} ${l.name.split(' ').slice(0,2).join(' ')}</span>`).join('')}
    </div>`;
}

function resetInfo(){
  document.getElementById('FS').textContent='◈';
  document.getElementById('FN').textContent='Select a Planet';
  document.getElementById('FP').textContent='Click any planet on the wheel';
  document.getElementById('FD').innerHTML='';
}

// ─────────────────────────────────────────
// STAR FIELD
// ─────────────────────────────────────────
function initStars(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:360},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    r:Math.random()*1.3+.15,op:Math.random()*.75+.1,
    sp:Math.random()*.004+.0008,ph:Math.random()*Math.PI*2
  }));
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const a=s.op*(0.45+0.55*Math.sin(t*s.sp+s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
    });
    t++;requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
initStars();
buildLayers();
draw();
</script>
